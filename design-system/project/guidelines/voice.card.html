<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-50); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .do, .dont { border-radius: var(--radius-md); padding: 14px 16px; }
  .do { background: var(--sage-100); border: 1px solid var(--sage-200); }
  .dont { background: var(--sale-100); }
  .k { font-size: 11px; font-weight: 700; letter-spacing: .04em; margin-bottom: 8px; }
  .do .k { color: var(--sage-700); }
  .dont .k { color: var(--sale-600); }
  .ln { font-size: 14px; color: var(--ink-800); line-height: 1.7; }
  .dont .ln { text-decoration: line-through; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="grid">
    <div class="do">
      <div class="k">نكتب هكذا ✓</div>
      <div class="ln">قطن ناعم… ليوم كامل من اللعب والراحة.</div>
      <div class="ln">خامة لطيفة على بشرة طفلك.</div>
      <div class="ln">أضِف إلى السلّة</div>
    </div>
    <div class="dont">
      <div class="k">نتجنّب ✗</div>
      <div class="ln">أفضل ملابس في العالم!!! 🔥👶</div>
      <div class="ln">عرض حصري لا يُفوّت الآن فورًا</div>
      <div class="ln">اشترِ!!!</div>
    </div>
  </div>
</body>
</html>
