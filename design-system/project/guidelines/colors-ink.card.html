<!-- @dsCard group="Colors" viewport="700x150" name="Ink — text on cream" subtitle="Warm brown-black, never pure #000." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-50); font-family: var(--font-body); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; }
  .nm { margin-top: 8px; font-size: 12px; color: var(--ink-700); font-weight: 600; }
  .vl { font-size: 11px; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900);color:var(--cream-50)">نص</div><div class="nm">ink-900</div><div class="vl">#2B2721 · strong</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700);color:var(--cream-50)">نص</div><div class="nm">ink-700</div><div class="vl">#5A5246 · body</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500);color:var(--cream-50)">نص</div><div class="nm">ink-500</div><div class="vl">#8C8473 · muted</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-300);color:var(--ink-900)">نص</div><div class="nm">ink-300</div><div class="vl">#B7AF9E · faint</div></div>
  </div>
</body>
</html>
