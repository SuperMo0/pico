<!-- @dsCard group="Colors" viewport="700x150" name="Sage accent" subtitle="The one accent. Used sparingly." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-50); font-family: var(--font-body); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid rgba(43,39,33,0.06); }
  .nm { margin-top: 8px; font-size: 12px; color: var(--ink-700); font-weight: 600; }
  .vl { font-size: 11px; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sage-700)"></div><div class="nm">sage-700</div><div class="vl">#5E6C4F</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-600)"></div><div class="nm">sage-600 · action</div><div class="vl">#6E7D5C</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-500)"></div><div class="nm">sage-500</div><div class="vl">#84926F</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-200)"></div><div class="nm">sage-200</div><div class="vl">#D5DCC6</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-100)"></div><div class="nm">sage-100 · tint</div><div class="vl">#E9EEDF</div></div>
  </div>
</body>
</html>
