<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — the warm canvas" subtitle="Cream & sand. The page lives here." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-50); font-family: var(--font-body); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .nm { margin-top: 8px; font-size: 12px; color: var(--ink-700); font-weight: 600; }
  .vl { font-size: 11px; color: var(--ink-500); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cream-50)"></div><div class="nm">cream-50</div><div class="vl">#FCFAF6 · page</div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-100)"></div><div class="nm">cream-100</div><div class="vl">#F6F1E9 · raised</div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-200)"></div><div class="nm">cream-200</div><div class="vl">#EFE8DC · sunken</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><div class="nm">sand-200</div><div class="vl">#E7DECF · hairline</div></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><div class="nm">sand-300</div><div class="vl">#D8CCB8 · border</div></div>
    <div class="sw"><div class="chip" style="background:var(--taupe-400)"></div><div class="nm">taupe-400</div><div class="vl">#B6A992 · muted</div></div>
  </div>
</body>
</html>
