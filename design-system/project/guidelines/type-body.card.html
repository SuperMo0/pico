<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream-50); font-family: var(--font-body); color: var(--ink-700); }
  .lead { font-size: 17px; line-height: 1.75; color: var(--ink-900); font-weight: 500; max-width: 60ch; }
  .p { font-size: 16px; line-height: 1.75; max-width: 60ch; margin-top: 8px; }
  .meta { display: flex; gap: 18px; margin-top: 14px; }
  .meta span { font-size: 12px; color: var(--ink-500); }
  .meta b { color: var(--ink-700); }
</style>
</head>
<body>
  <div class="lead">ملابس منزلية مريحة بألوان هادئة، مصنوعة من قطن لطيف على بشرة طفلك.</div>
  <div class="p">نختار خاماتنا بعناية لتبقى ناعمة بعد كل غسلة، وتمنح طفلك يومًا كاملًا من اللعب والراحة.</div>
  <div class="meta">
    <span>body-lg · <b>17</b></span>
    <span>body · <b>16</b></span>
    <span>sm · <b>14</b></span>
    <span>xs · <b>12</b></span>
  </div>
</body>
</html>
