<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="8px rhythm. Generous whitespace." -->
<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream-50); font-family: var(--font-body); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .col { text-align: center; }
  .bar { background: var(--sage-200); border-radius: 3px; width: 100%; }
  .b1 { height: 4px; } .b2 { height: 8px; } .b3 { height: 12px; } .b4 { height: 16px; }
  .b5 { height: 24px; } .b6 { height: 32px; } .b7 { height: 40px; } .b8 { height: 48px; }
  .nm { font-size: 11px; color: var(--ink-700); font-weight: 600; margin-top: 8px; }
  .vl { font-size: 10px; color: var(--ink-500); }
  .col { width: 60px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="bar b1"></div><div class="nm">1</div><div class="vl">4px</div></div>
    <div class="col"><div class="bar b2"></div><div class="nm">2</div><div class="vl">8px</div></div>
    <div class="col"><div class="bar b3"></div><div class="nm">3</div><div class="vl">12px</div></div>
    <div class="col"><div class="bar b4"></div><div class="nm">4</div><div class="vl">16px</div></div>
    <div class="col"><div class="bar b5"></div><div class="nm">5</div><div class="vl">24px</div></div>
    <div class="col"><div class="bar b6"></div><div class="nm">6</div><div class="vl">32px</div></div>
    <div class="col"><div class="bar b7"></div><div class="nm">7</div><div class="vl">40px</div></div>
    <div class="col"><div class="bar b8"></div><div class="nm">8</div><div class="vl">48px</div></div>
  </div>
</body>
</html>
