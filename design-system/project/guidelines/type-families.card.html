<!-- @dsCard group="Type" viewport="700x200" name="Type families" subtitle="Tajawal (display) + IBM Plex Sans Arabic (body)." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream-50); }
  .row { display: flex; gap: 28px; }
  .col { flex: 1; }
  .lbl { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-500); font-weight: 600; margin-bottom: 6px; }
  .big { color: var(--ink-900); line-height: 1.2; }
  .disp { font-family: var(--font-display); font-weight: 800; font-size: 44px; }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--ink-500); margin-top: 8px; }
  .body { font-family: var(--font-body); font-weight: 400; font-size: 26px; }
</style>
</head>
<body>
  <div class="row">
    <div class="col">
      <div class="lbl">Display · Tajawal</div>
      <div class="big disp">بيكو للأطفال</div>
      <div class="meta">العناوين والشعار · 400 / 500 / 700 / 800</div>
    </div>
    <div class="col">
      <div class="lbl">Body · IBM Plex Sans Arabic</div>
      <div class="big body">قطن ناعم ولطيف على البشرة</div>
      <div class="meta">النصوص والواجهة · 400 / 500 / 600 / 700</div>
    </div>
  </div>
</body>
</html>
