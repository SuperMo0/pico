<!-- @dsCard group="Type" viewport="700x260" name="Display & headings" subtitle="Tajawal. Bold but not huge." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream-50); font-family: var(--font-display); color: var(--ink-900); }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--sand-200); padding: 10px 0; }
  .line:last-child { border-bottom: none; }
  .tag { font-family: var(--font-body); font-size: 11px; color: var(--ink-500); width: 120px; flex: none; }
  .d { font-size: 52px; font-weight: 800; line-height: 1.15; }
  .h1 { font-size: 40px; font-weight: 700; }
  .h2 { font-size: 30px; font-weight: 700; }
  .h3 { font-size: 22px; font-weight: 700; }
</style>
</head>
<body>
  <div class="line"><span class="tag">display · 52 / 800</span><span class="d">قطن تثق به</span></div>
  <div class="line"><span class="tag">h1 · 40 / 700</span><span class="h1">مجموعة الخريف</span></div>
  <div class="line"><span class="tag">h2 · 30 / 700</span><span class="h2">الأكثر مبيعًا</span></div>
  <div class="line"><span class="tag">h3 · 22 / 700</span><span class="h3">تيشيرت بأكمام طويلة</span></div>
</body>
</html>
