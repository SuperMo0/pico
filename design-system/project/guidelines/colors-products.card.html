<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--cream-50); font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .sw { text-align: center; }
  .dot { width: 100%; aspect-ratio: 1; border-radius: var(--radius-pill); border: 1px solid rgba(43,39,33,0.10); }
  .nm { margin-top: 8px; font-size: 12px; color: var(--ink-700); font-weight: 600; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw"><div class="dot" style="background:var(--pc-blue)"></div><div class="nm">أزرق</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-pink)"></div><div class="nm">وردي</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-peach)"></div><div class="nm">مشمشي</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-mint)"></div><div class="nm">نعناعي</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-sage)"></div><div class="nm">زيتي</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-lilac)"></div><div class="nm">بنفسجي</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-cream)"></div><div class="nm">بيج</div></div>
    <div class="sw"><div class="dot" style="background:var(--pc-grey)"></div><div class="nm">رمادي</div></div>
  </div>
</body>
</html>
