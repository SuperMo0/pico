<!-- @dsCard group="Components" viewport="700x520" name="Commerce — product cards, price, logo" subtitle="Listing tiles & price display." -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--cream-50); font-family: var(--font-body); }
  .lbl { font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-500); font-weight: 600; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .prices { display: flex; gap: 28px; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--sand-200); }
</style>
</head>
<body>
  <div class="lbl">Product cards</div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.BeekoDesignSystem_e717fe;
    const { ProductCard, PriceTag, Logo } = NS;
    const P = '../../assets/products/';
    function Demo() {
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      return (
        <div>
          <div className="grid">
            <ProductCard image={P+'tee-blue.jpeg'} hoverImage={P+'tee-peach.jpeg'}
              name="تيشيرت قطني بأكمام قصيرة" ageRange="٠–٣ أشهر" price="٨٩"
              colors={['blue','peach','mint','grey']} badge="جديد" />
            <ProductCard image={P+'top-peach-longsleeve.jpeg'}
              name="بلوزة قطنية بأكمام طويلة" ageRange="٦–١٢ شهر" price="٦٩" was="٨٩"
              colors={['peach','cream','grey']} badge="خصم" badgeTone="sale" wished />
            <ProductCard image={P+'pants-blue.jpeg'}
              name="بنطلون قطني مريح" ageRange="سنة–سنتان" price="٧٩"
              colors={['blue','sage','lilac']} />
          </div>
          <div className="prices">
            <PriceTag price="٨٩" />
            <PriceTag price="٦٩" was="٨٩" size="lg" />
            <div style={{ marginInlineStart: 'auto' }}><Logo size={30} tagline /></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</body>
</html>
